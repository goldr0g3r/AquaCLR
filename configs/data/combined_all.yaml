# MSRB + LSUI + UIEB combined sampler — all three datasets.
#
# MSRB provides marine-snow supervision, LSUI adds physics-grade
# transmission priors, UIEB contributes diverse real-world underwater
# colour/haze conditions (890 paired images).
_target_: aquaclr.data.combined_datamodule.CombinedDataModule

msrb:
  _target_: aquaclr.data.msrb_dataset.MSRBDataModule
  root: ${paths.data_root}/msrb
  task: 1
  image_size: 256
  batch_size: 8
  num_workers: 4
  augment: true
  download: false

lsui:
  _target_: aquaclr.data.lsui_dataset.LSUIDataModule
  root: ${paths.data_root}/lsui
  image_size: 256
  batch_size: 4
  num_workers: 4
  augment: true
  load_transmission_gt: true
  download: false

uieb:
  _target_: aquaclr.data.uieb_dataset.UIEBDataModule
  root: ${paths.data_root}/uieb
  image_size: 256
  batch_size: 4
  num_workers: 4
  augment: true
  download: false

mix_ratio: [0.5, 0.25, 0.25] # P(MSRB), P(LSUI), P(UIEB)
val_use: msrb # use MSRB val split for primary metrics
